; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-core2]
;platform = espressif32
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = m5stack-core2
framework = arduino
monitor_speed = 115200
lib_deps =
  m5stack/M5Unified
  https://github.com/espressif/esp-adf-libs
build_flags = 
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=5
  -D_ESP_LOGLEVEL_=5
  -DCONFIG_AUDIO_ENCODER_AAC_SUPPORT
  -I${PROJECT_LIBDEPS_DIR}/${PIOENV}/esp-adf-libs/include
  -I${PROJECT_LIBDEPS_DIR}/${PIOENV}/esp-adf-libs/include/encoder
  -I${PROJECT_LIBDEPS_DIR}/${PIOENV}/esp-adf-libs/include/encoder/impl
  -I${PROJECT_LIBDEPS_DIR}/${PIOENV}/esp-adf-libs/include/simple_dec
  -I${PROJECT_LIBDEPS_DIR}/${PIOENV}/esp-adf-libs/include/simple_dec/impl
  -I${PROJECT_LIBDEPS_DIR}/${PIOENV}/esp-adf-libs/include/decoder
  -I${PROJECT_LIBDEPS_DIR}/${PIOENV}/esp-adf-libs/include/decoder/impl
  -L${PROJECT_LIBDEPS_DIR}/${PIOENV}/esp-adf-libs/lib/esp32
  -lesp_audio_codec
